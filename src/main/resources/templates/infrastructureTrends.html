{#include base}
{#title}Infrastructure Trends - PostgreSQL Console{/title}

<div id="refreshable-content">

<div class="row mb-4">
    <div class="col">
        <h1>Infrastructure Trends</h1>
        <p class="text-muted">WAL activity, checkpoint frequency, and buffer statistics over time</p>
    </div>
    <div class="col-auto d-flex align-items-center gap-2">
        <div class="btn-group" role="group" aria-label="Time window">
            <a class="btn btn-outline-secondary btn-sm {#if hours == 1}active{/if}"
               href="/diagnostics/infrastructure-trends?instance={instance}&hours=1">1h</a>
            <a class="btn btn-outline-secondary btn-sm {#if hours == 6}active{/if}"
               href="/diagnostics/infrastructure-trends?instance={instance}&hours=6">6h</a>
            <a class="btn btn-outline-secondary btn-sm {#if hours == 24}active{/if}"
               href="/diagnostics/infrastructure-trends?instance={instance}&hours=24">24h</a>
            <a class="btn btn-outline-secondary btn-sm {#if hours == 72}active{/if}"
               href="/diagnostics/infrastructure-trends?instance={instance}&hours=72">3d</a>
            <a class="btn btn-outline-secondary btn-sm {#if hours == 168}active{/if}"
               href="/diagnostics/infrastructure-trends?instance={instance}&hours=168">7d</a>
        </div>
        <span class="badge bg-info" id="dataPointsBadge">
            <i class="bi bi-database"></i> <span id="dataPointsCount">-</span> points
        </span>
    </div>
</div>

<div class="row">
    <!-- WAL Activity -->
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-journal-text"></i> WAL Records</h5>
            </div>
            <div class="card-body">
                <div class="chart-container" style="position: relative; height: 250px;">
                    <canvas id="walRecordsChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-hdd"></i> WAL Bytes</h5>
            </div>
            <div class="card-body">
                <div class="chart-container" style="position: relative; height: 250px;">
                    <canvas id="walBytesChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <!-- Checkpoint Activity -->
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-check2-circle"></i> Checkpoints</h5>
            </div>
            <div class="card-body">
                <div class="chart-container" style="position: relative; height: 250px;">
                    <canvas id="checkpointsChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-clock"></i> Checkpoint Timing</h5>
            </div>
            <div class="card-body">
                <div class="chart-container" style="position: relative; height: 250px;">
                    <canvas id="checkpointTimingChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <!-- Buffer Activity -->
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-memory"></i> Buffer Activity</h5>
            </div>
            <div class="card-body">
                <div class="chart-container" style="position: relative; height: 250px;">
                    <canvas id="buffersChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
    const instance = '{instance ?: "default"}';
    const hours = {hours};

    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300 },
        interaction: { mode: 'index', intersect: false },
        scales: {
            x: {
                type: 'time',
                time: { tooltipFormat: 'HH:mm:ss', displayFormats: { second: 'HH:mm:ss', minute: 'HH:mm', hour: 'dd HH:mm' } },
                title: { display: false }
            },
            y: { beginAtZero: true, title: { display: false } }
        },
        plugins: {
            legend: { display: true, position: 'top', labels: { usePointStyle: true, boxWidth: 8 } },
            tooltip: { mode: 'index', intersect: false }
        }
    };

    function makePoint(ts, val) { return { x: new Date(ts).getTime(), y: val || 0 }; }

    const walRecordsChart = new Chart(document.getElementById('walRecordsChart'), {
        type: 'line',
        data: { datasets: [
            { label: 'WAL Records', data: [], borderColor: '#007bff', backgroundColor: 'rgba(0,123,255,0.1)', tension: 0.2, fill: true, pointRadius: 0 },
            { label: 'WAL FPI', data: [], borderColor: '#ffc107', backgroundColor: 'rgba(255,193,7,0.1)', tension: 0.2, fill: true, pointRadius: 0 }
        ] },
        options: commonOptions
    });

    const walBytesChart = new Chart(document.getElementById('walBytesChart'), {
        type: 'line',
        data: { datasets: [
            { label: 'WAL Bytes', data: [], borderColor: '#28a745', backgroundColor: 'rgba(40,167,69,0.1)', tension: 0.2, fill: true, pointRadius: 0 }
        ] },
        options: commonOptions
    });

    const checkpointsChart = new Chart(document.getElementById('checkpointsChart'), {
        type: 'line',
        data: { datasets: [
            { label: 'Timed', data: [], borderColor: '#28a745', backgroundColor: 'rgba(40,167,69,0.1)', tension: 0.2, fill: true, pointRadius: 0 },
            { label: 'Requested', data: [], borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,0.1)', tension: 0.2, fill: true, pointRadius: 0 }
        ] },
        options: commonOptions
    });

    const checkpointTimingChart = new Chart(document.getElementById('checkpointTimingChart'), {
        type: 'line',
        data: { datasets: [
            { label: 'Write Time (ms)', data: [], borderColor: '#007bff', backgroundColor: 'rgba(0,123,255,0.1)', tension: 0.2, fill: true, pointRadius: 0 },
            { label: 'Sync Time (ms)', data: [], borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,0.1)', tension: 0.2, fill: true, pointRadius: 0 }
        ] },
        options: commonOptions
    });

    const buffersChart = new Chart(document.getElementById('buffersChart'), {
        type: 'line',
        data: { datasets: [
            { label: 'Checkpoint', data: [], borderColor: '#007bff', backgroundColor: 'rgba(0,123,255,0.1)', tension: 0.2, fill: true, pointRadius: 0 },
            { label: 'Clean', data: [], borderColor: '#28a745', backgroundColor: 'rgba(40,167,69,0.1)', tension: 0.2, fill: true, pointRadius: 0 },
            { label: 'Backend', data: [], borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,0.1)', tension: 0.2, fill: true, pointRadius: 0 },
            { label: 'Alloc', data: [], borderColor: '#6c757d', backgroundColor: 'rgba(108,117,125,0.1)', tension: 0.2, fill: true, pointRadius: 0 }
        ] },
        options: commonOptions
    });

    function loadData() {
        fetch('/api/diagnostics/history/infrastructure?instance=' + encodeURIComponent(instance) + '&hours=' + hours)
            .then(r => r.json())
            .then(function(data) {
                document.getElementById('dataPointsCount').textContent = data.length;

                walRecordsChart.data.datasets[0].data = data.map(d => makePoint(d.sampledAt, d.walRecords));
                walRecordsChart.data.datasets[1].data = data.map(d => makePoint(d.sampledAt, d.walFpi));
                walRecordsChart.update();

                walBytesChart.data.datasets[0].data = data.map(d => makePoint(d.sampledAt, d.walBytes));
                walBytesChart.update();

                checkpointsChart.data.datasets[0].data = data.map(d => makePoint(d.sampledAt, d.checkpointsTimed));
                checkpointsChart.data.datasets[1].data = data.map(d => makePoint(d.sampledAt, d.checkpointsReq));
                checkpointsChart.update();

                checkpointTimingChart.data.datasets[0].data = data.map(d => makePoint(d.sampledAt, d.checkpointWriteTime));
                checkpointTimingChart.data.datasets[1].data = data.map(d => makePoint(d.sampledAt, d.checkpointSyncTime));
                checkpointTimingChart.update();

                buffersChart.data.datasets[0].data = data.map(d => makePoint(d.sampledAt, d.buffersCheckpoint));
                buffersChart.data.datasets[1].data = data.map(d => makePoint(d.sampledAt, d.buffersClean));
                buffersChart.data.datasets[2].data = data.map(d => makePoint(d.sampledAt, d.buffersBackend));
                buffersChart.data.datasets[3].data = data.map(d => makePoint(d.sampledAt, d.buffersAlloc));
                buffersChart.update();
            })
            .catch(err => console.warn('Failed to load infrastructure history:', err));
    }

    loadData();
</script>

{/include}
